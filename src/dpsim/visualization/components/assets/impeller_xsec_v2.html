<!doctype html>
<!--
  ImpellerCrossSection v2 — disk-style 19-tab Stirrer A in glass beaker.

  Geometry sourced from cad/scripts/build_geometry.py (verified
  2026-05-01 against measurement photos):
    Stirrer A — Ø 59 mm flat disk × 1 mm thick, 19 perimeter tabs
                (10 UP + 9 DOWN, alternating; 90° perpendicular bend;
                10° tangential fan-pitch).
    Beaker   — Ø 100 mm inner × 130 mm tall.

  Four view states cycled by a single toggle button:
    1: side-view cross-section, opaque agitator
    2: bottom-up cross-section, opaque agitator
    3: side-view cross-section, transparent agitator (emphasises
        circulation flow + droplet collisions)
    4: bottom-up cross-section, transparent agitator

  Physical fidelity (v2.1, 2026-05-01):
    * Flow paths represent literature consensus circulation cells for
      a disk-style impeller in a baffled vessel: radial discharge from
      the impeller plane, figure-8 cells in side projection (upper +
      lower), tangential swirl + radial discharge in plan view.
    * Droplets follow the streamlines via SVG <animateMotion>, not
      arbitrary keyframe drift.
    * Side-view agitator motion: horizontal motion-blur streaks across
      the impeller plane indicate rotation (the disk-edge silhouette
      is invariant under axial rotation, so we use streaks to convey
      the kinetic state).
    * Break-up events: a parent droplet animates onto the impeller
      plane, then disappears as two smaller fragment droplets appear
      and travel outward along the radial discharge.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --bg:        #020617;
    --surface:   #0F172A;
    --surface-2: #1E293B;
    --border:    rgba(71, 85, 105, 0.55);
    --text:      #F8FAFC;
    --text-muted: #94A3B8;
    --text-dim:  #64748B;
    --accent:    #2DD4BF;
    --orange:    #F97316;
    --sky:       #7DD3FC;
    --magenta:   #E879F9;
    --steel:     #94A3B8;
    --steel-dark: #64748B;
    --glass:     rgba(125, 211, 252, 0.25);
  }
  body.light {
    --bg: #FAFBFC; --surface: #FFFFFF; --surface-2: #F1F5F9;
    --border: rgba(148,163,184,0.35);
    --text: #0F172A; --text-muted: #64748B; --text-dim: #94A3B8;
    --accent: #14B8A6;
    --glass: rgba(56, 189, 248, 0.20);
  }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    position: relative;
    width: __WIDTH__px;
    height: __HEIGHT__px;
    margin: 0 auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .toggle-btn {
    position: absolute;
    top: 8px; right: 8px;
    z-index: 10;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 10px;
    font-family: "Geist Mono", "JetBrains Mono", Menlo, monospace;
    letter-spacing: 0.04em;
    cursor: pointer;
    user-select: none;
  }
  .toggle-btn:hover { background: var(--surface-2); }
  .view-label {
    position: absolute;
    top: 8px; left: 8px;
    z-index: 5;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 9.5px;
    font-family: "Geist Mono", "JetBrains Mono", Menlo, monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .stage { position: absolute; inset: 0; }
  .stage svg {
    display: block;
    width: 100%; height: 100%;
  }
  .view {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 220ms ease;
    pointer-events: none;
  }
  .view.active {
    opacity: 1;
    pointer-events: auto;
  }
  .agitator { transition: opacity 200ms ease; }
  .view:not(.transparent) .agitator { opacity: 1.0; }
  .view.transparent .agitator { opacity: 0.22; }
  .view.transparent .flow-path { opacity: 0.95; }
  .view:not(.transparent) .flow-path { opacity: 0.55; }

  /* Disk rotation (bottom view) */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .rotor-spin {
    animation: spin var(--spin-period, 0.5s) linear infinite;
    transform-origin: center;
  }

  /* Side-view agitator motion-blur streaks: horizontal lines that drift
     across the impeller zone, suggesting the tabs cycling in/out of the
     side projection plane. */
  @keyframes streak-flow {
    0%   { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: -40; }
  }
  .motion-streak {
    fill: none;
    stroke-dasharray: 4 4;
    animation: streak-flow var(--streak-period, 0.4s) linear infinite;
  }

  /* Side-view tab pulse — alternates UP/DOWN tab opacity to suggest
     rotational cycling; the spatial silhouette is invariant under
     rotation, so we modulate brightness with phase offsets per tab. */
  @keyframes tab-cycle {
    0%, 60%   { opacity: 1.0; }
    65%, 95%  { opacity: 0.55; }
    100%      { opacity: 1.0; }
  }
  .tab-up, .tab-dn {
    animation: tab-cycle var(--spin-period, 0.5s) linear infinite;
  }

  .legend {
    position: absolute;
    bottom: 6px; left: 8px; right: 8px;
    display: flex; gap: 14px;
    font-size: 9.5px;
    color: var(--text-dim);
    font-family: "Geist Mono", "JetBrains Mono", Menlo, monospace;
    letter-spacing: 0.04em;
    flex-wrap: wrap;
    justify-content: center;
    pointer-events: none;
  }
  .legend .swatch {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: -1px;
  }
</style>
</head>
<body class="__THEME__">
  <div class="frame">
    <button class="toggle-btn" id="toggleBtn" aria-label="Toggle view">SIDE · OPAQUE</button>
    <div class="view-label" id="viewLabel">VIEW 1 / 4</div>

    <!--
      Shared SVG defs: arrow markers and named flow paths used by
      <animateMotion><mpath/></animateMotion>. Defined once and
      referenced from every view via <use xlink:href>.
    -->
    <svg width="0" height="0" style="position:absolute" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
      <defs>
        <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent)" />
        </marker>
        <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--orange)" />
        </marker>

        <!-- Side-view circulation cells (figure-8) -->
        <!-- Upper-right loop: impeller tip → wall → up → top → down shaft → impeller -->
        <path id="loopUR" d="M 200 195 Q 245 195 250 175 Q 255 130 250 90 Q 240 75 195 75 Q 170 75 165 110 Q 168 165 175 188 Q 188 195 200 195 Z" />
        <!-- Upper-left mirror -->
        <path id="loopUL" d="M 120 195 Q 75 195 70 175 Q 65 130 70 90 Q 80 75 125 75 Q 150 75 155 110 Q 152 165 145 188 Q 132 195 120 195 Z" />
        <!-- Lower-right loop -->
        <path id="loopLR" d="M 200 198 Q 245 198 250 220 Q 255 270 245 290 Q 235 300 200 300 Q 175 300 168 265 Q 170 218 178 202 Q 188 198 200 198 Z" />
        <!-- Lower-left mirror -->
        <path id="loopLL" d="M 120 198 Q 75 198 70 220 Q 65 270 75 290 Q 85 300 120 300 Q 145 300 152 265 Q 150 218 142 202 Q 132 198 120 198 Z" />

        <!-- Bottom-view tangential swirl (CCW circulation around the disk) -->
        <path id="swirlOuter" d="M 160 50 A 110 110 0 1 1 159 50 Z" />
        <path id="swirlMid" d="M 160 90 A 70 70 0 1 1 159 90 Z" />
        <!-- Bottom-view radial discharge (impeller out to wall, 6 directions) -->
        <path id="discharge0" d="M 200 180 L 285 180" />
        <path id="discharge1" d="M 180 215 L 220 285" />
        <path id="discharge2" d="M 140 215 L 100 285" />
        <path id="discharge3" d="M 120 180 L 35 180" />
        <path id="discharge4" d="M 140 145 L 100 75" />
        <path id="discharge5" d="M 180 145 L 220 75" />
      </defs>
    </svg>

    <!-- ==================== VIEW 1: side, opaque ==================== -->
    <div class="view active" data-view="1">
      <div class="stage">
        <svg viewBox="0 0 320 360" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
          <!-- Beaker walls -->
          <g class="beaker">
            <path d="M 60 60 L 60 295 Q 60 305 70 305 L 250 305 Q 260 305 260 295 L 260 60 L 252 50"
                  fill="none" stroke="var(--steel-dark)" stroke-width="1.6" />
            <path d="M 68 50 L 60 60" fill="none" stroke="var(--steel-dark)" stroke-width="1.6" />
            <path d="M 60 70 L 50 50 M 260 70 L 270 50" fill="none" stroke="var(--steel-dark)" stroke-width="1.6" />
            <path d="M 64 130 L 64 290 Q 64 301 75 301 L 245 301 Q 256 301 256 290 L 256 130 Z"
                  fill="var(--glass)" stroke="none" />
            <line x1="64" y1="130" x2="256" y2="130" stroke="var(--sky)" stroke-width="1" stroke-dasharray="2 4" opacity="0.6" />
          </g>

          <!-- Circulation paths with directional arrowheads -->
          <g class="flow-path" fill="none" stroke="var(--accent)" stroke-width="1.4">
            <use xlink:href="#loopUR" marker-end="url(#arrowAccent)" />
            <use xlink:href="#loopUL" marker-end="url(#arrowAccent)" />
            <use xlink:href="#loopLR" marker-end="url(#arrowAccent)" />
            <use xlink:href="#loopLL" marker-end="url(#arrowAccent)" />
          </g>

          <!-- Agitator: shaft + disk + tabs -->
          <g class="agitator">
            <line x1="160" y1="40" x2="160" y2="195"
                  stroke="var(--steel)" stroke-width="3" stroke-linecap="round" />
            <rect x="118" y="194" width="84" height="2.2"
                  fill="var(--steel)" stroke="var(--steel-dark)" stroke-width="0.5" />
            <!-- Tabs UP -->
            <g class="tab-up">
              <rect x="120" y="183" width="2" height="11" fill="var(--steel)" />
              <rect x="138" y="183" width="2" height="11" fill="var(--steel)" />
              <rect x="156" y="183" width="2" height="11" fill="var(--steel)" />
              <rect x="174" y="183" width="2" height="11" fill="var(--steel)" />
              <rect x="192" y="183" width="2" height="11" fill="var(--steel)" />
            </g>
            <!-- Tabs DOWN, opposite phase -->
            <g class="tab-dn" style="animation-delay: calc(var(--spin-period, 0.5s) * -0.5)">
              <rect x="129" y="196" width="2" height="11" fill="var(--steel)" />
              <rect x="147" y="196" width="2" height="11" fill="var(--steel)" />
              <rect x="165" y="196" width="2" height="11" fill="var(--steel)" />
              <rect x="183" y="196" width="2" height="11" fill="var(--steel)" />
            </g>
            <!-- Side-view rotation indicator: motion-blur streaks -->
            <g stroke="var(--accent)" stroke-width="0.8" opacity="0.55">
              <path class="motion-streak" d="M 122 188 L 200 188" />
              <path class="motion-streak" d="M 122 202 L 200 202" />
            </g>
            <!-- Rotation arrow on shaft -->
            <path d="M 154 60 A 6 6 0 1 1 166 60 L 162 56 M 166 60 L 162 64"
                  fill="none" stroke="var(--accent)" stroke-width="0.9" />
          </g>

          <!-- Droplets following streamlines (animateMotion along loop paths) -->
          <g class="droplets">
            <!-- Upper-right loop: 2 droplets phase-staggered -->
            <g>
              <circle r="5" fill="var(--orange)" opacity="0.85" />
              <circle r="1.6" fill="var(--sky)" />
              <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#loopUR" />
              </animateMotion>
            </g>
            <g>
              <circle r="4" fill="var(--orange)" opacity="0.85" />
              <circle r="1.4" fill="var(--sky)" />
              <animateMotion dur="6s" begin="-3s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#loopUR" />
              </animateMotion>
            </g>
            <!-- Upper-left -->
            <g>
              <circle r="5" fill="var(--orange)" opacity="0.85" />
              <circle r="1.6" fill="var(--sky)" />
              <animateMotion dur="6s" begin="-1.5s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#loopUL" />
              </animateMotion>
            </g>
            <!-- Lower-right -->
            <g>
              <circle r="6" fill="var(--orange)" opacity="0.85" />
              <circle r="2" fill="var(--sky)" />
              <animateMotion dur="7s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#loopLR" />
              </animateMotion>
            </g>
            <g>
              <circle r="4" fill="var(--orange)" opacity="0.85" />
              <circle r="1.4" fill="var(--sky)" />
              <animateMotion dur="7s" begin="-3.5s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#loopLR" />
              </animateMotion>
            </g>
            <!-- Lower-left -->
            <g>
              <circle r="5" fill="var(--orange)" opacity="0.85" />
              <circle r="1.6" fill="var(--sky)" />
              <animateMotion dur="7s" begin="-2s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#loopLL" />
              </animateMotion>
            </g>
          </g>
        </svg>
      </div>
    </div>

    <!-- ==================== VIEW 2: bottom, opaque ==================== -->
    <div class="view" data-view="2">
      <div class="stage">
        <svg viewBox="0 0 320 360" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
          <circle cx="160" cy="180" r="142" fill="none" stroke="var(--steel-dark)" stroke-width="1.6" />
          <circle cx="160" cy="180" r="140" fill="var(--glass)" stroke="none" />

          <!-- Tangential swirl + radial discharge (basic) -->
          <g class="flow-path" fill="none" stroke="var(--accent)" stroke-width="1.4">
            <use xlink:href="#swirlOuter" marker-end="url(#arrowAccent)" />
            <use xlink:href="#swirlMid" marker-end="url(#arrowAccent)" opacity="0.6" />
          </g>

          <!-- Rotating disk + tabs -->
          <g class="agitator rotor-spin" style="transform-origin: 160px 180px">
            <circle cx="160" cy="180" r="42" fill="var(--steel)" stroke="var(--steel-dark)" stroke-width="0.6" />
            <g id="tabs-bottom"></g>
            <circle cx="160" cy="180" r="6" fill="var(--bg)" stroke="var(--steel-dark)" stroke-width="0.5" />
            <path d="M 160 150 A 30 30 0 0 1 188 178 L 184 174 M 188 178 L 184 182"
                  fill="none" stroke="var(--accent)" stroke-width="1.2" />
          </g>

          <!-- Droplets swirling tangentially -->
          <g class="droplets">
            <g>
              <circle r="5" fill="var(--orange)" opacity="0.85" />
              <circle r="1.6" fill="var(--sky)" />
              <animateMotion dur="4s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#swirlOuter" />
              </animateMotion>
            </g>
            <g>
              <circle r="4" fill="var(--orange)" opacity="0.85" />
              <circle r="1.4" fill="var(--sky)" />
              <animateMotion dur="4s" begin="-1s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#swirlOuter" />
              </animateMotion>
            </g>
            <g>
              <circle r="5" fill="var(--orange)" opacity="0.85" />
              <circle r="1.6" fill="var(--sky)" />
              <animateMotion dur="4s" begin="-2s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#swirlOuter" />
              </animateMotion>
            </g>
            <g>
              <circle r="3.5" fill="var(--orange)" opacity="0.85" />
              <circle r="1.2" fill="var(--sky)" />
              <animateMotion dur="2.4s" begin="-0.5s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#swirlMid" />
              </animateMotion>
            </g>
            <g>
              <circle r="3.5" fill="var(--orange)" opacity="0.85" />
              <circle r="1.2" fill="var(--sky)" />
              <animateMotion dur="2.4s" begin="-1.5s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#swirlMid" />
              </animateMotion>
            </g>
          </g>
        </svg>
      </div>
    </div>

    <!-- ==================== VIEW 3: side, transparent ==================== -->
    <div class="view transparent" data-view="3">
      <div class="stage">
        <svg viewBox="0 0 320 360" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
          <g class="beaker">
            <path d="M 60 60 L 60 295 Q 60 305 70 305 L 250 305 Q 260 305 260 295 L 260 60 L 252 50"
                  fill="none" stroke="var(--steel-dark)" stroke-width="1.6" />
            <path d="M 68 50 L 60 60" fill="none" stroke="var(--steel-dark)" stroke-width="1.6" />
            <path d="M 60 70 L 50 50 M 260 70 L 270 50" fill="none" stroke="var(--steel-dark)" stroke-width="1.6" />
            <path d="M 64 130 L 64 290 Q 64 301 75 301 L 245 301 Q 256 301 256 290 L 256 130 Z"
                  fill="var(--glass)" stroke="none" />
            <line x1="64" y1="130" x2="256" y2="130" stroke="var(--sky)" stroke-width="1" stroke-dasharray="2 4" opacity="0.6" />
          </g>

          <!-- Emphasised flow with directional arrows -->
          <g class="flow-path" fill="none" stroke="var(--accent)" stroke-width="2">
            <use xlink:href="#loopUR" marker-end="url(#arrowAccent)" />
            <use xlink:href="#loopUL" marker-end="url(#arrowAccent)" />
            <use xlink:href="#loopLR" marker-end="url(#arrowAccent)" />
            <use xlink:href="#loopLL" marker-end="url(#arrowAccent)" />
          </g>

          <!-- Radial discharge jets (orange) emerging from impeller plane -->
          <g class="flow-path" fill="none" stroke="var(--orange)" stroke-width="1.6">
            <line x1="200" y1="195" x2="245" y2="195" marker-end="url(#arrowOrange)" />
            <line x1="120" y1="195" x2="75" y2="195" marker-end="url(#arrowOrange)" />
          </g>

          <!-- Transparent agitator (faded but still rotates via streaks) -->
          <g class="agitator">
            <line x1="160" y1="40" x2="160" y2="195" stroke="var(--steel)" stroke-width="3" stroke-linecap="round" />
            <rect x="118" y="194" width="84" height="2.2" fill="var(--steel)" />
            <g class="tab-up">
              <rect x="120" y="183" width="2" height="11" fill="var(--steel)" />
              <rect x="138" y="183" width="2" height="11" fill="var(--steel)" />
              <rect x="156" y="183" width="2" height="11" fill="var(--steel)" />
              <rect x="174" y="183" width="2" height="11" fill="var(--steel)" />
              <rect x="192" y="183" width="2" height="11" fill="var(--steel)" />
            </g>
            <g class="tab-dn" style="animation-delay: calc(var(--spin-period, 0.5s) * -0.5)">
              <rect x="129" y="196" width="2" height="11" fill="var(--steel)" />
              <rect x="147" y="196" width="2" height="11" fill="var(--steel)" />
              <rect x="165" y="196" width="2" height="11" fill="var(--steel)" />
              <rect x="183" y="196" width="2" height="11" fill="var(--steel)" />
            </g>
            <g stroke="var(--accent)" stroke-width="1.0" opacity="0.7">
              <path class="motion-streak" d="M 122 188 L 200 188" />
              <path class="motion-streak" d="M 122 202 L 200 202" />
            </g>
          </g>

          <!-- Droplets follow circulation -->
          <g class="droplets">
            <g>
              <circle r="6" fill="var(--orange)" opacity="0.9" />
              <circle r="2" fill="var(--sky)" />
              <animateMotion dur="5s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#loopUR" />
              </animateMotion>
            </g>
            <g>
              <circle r="6" fill="var(--orange)" opacity="0.9" />
              <circle r="2" fill="var(--sky)" />
              <animateMotion dur="5s" begin="-1.7s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#loopUL" />
              </animateMotion>
            </g>
            <g>
              <circle r="7" fill="var(--orange)" opacity="0.9" />
              <circle r="2.4" fill="var(--sky)" />
              <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#loopLR" />
              </animateMotion>
            </g>
            <g>
              <circle r="7" fill="var(--orange)" opacity="0.9" />
              <circle r="2.4" fill="var(--sky)" />
              <animateMotion dur="6s" begin="-2s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#loopLL" />
              </animateMotion>
            </g>

            <!-- Break-up event RIGHT side: parent travels into impeller, fragments emerge -->
            <g>
              <circle r="6" fill="var(--orange)" opacity="0.9">
                <animate attributeName="opacity" values="0.9;0.9;0;0" keyTimes="0;0.45;0.5;1" dur="2.4s" repeatCount="indefinite" />
              </circle>
              <circle r="2" fill="var(--sky)">
                <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.5;1" dur="2.4s" repeatCount="indefinite" />
              </circle>
              <animateMotion dur="2.4s" repeatCount="indefinite">
                <mpath xlink:href="#loopUR" />
              </animateMotion>
            </g>
            <!-- Fragment 1 (small, emerges at impeller, moves outward+up) -->
            <g>
              <circle r="2.5" fill="var(--orange)">
                <animate attributeName="opacity" values="0;0;0.9;0.9;0" keyTimes="0;0.5;0.55;0.95;1" dur="2.4s" repeatCount="indefinite" />
              </circle>
              <circle r="0.8" fill="var(--sky)">
                <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.55;0.95;1" dur="2.4s" repeatCount="indefinite" />
              </circle>
              <animateTransform attributeName="transform" type="translate"
                values="200,195; 200,195; 240,180; 250,80"
                keyTimes="0;0.5;0.7;1" dur="2.4s" repeatCount="indefinite" />
            </g>
            <!-- Fragment 2 (small, moves outward+down) -->
            <g>
              <circle r="2.5" fill="var(--orange)">
                <animate attributeName="opacity" values="0;0;0.9;0.9;0" keyTimes="0;0.5;0.55;0.95;1" dur="2.4s" repeatCount="indefinite" />
              </circle>
              <circle r="0.8" fill="var(--sky)">
                <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.55;0.95;1" dur="2.4s" repeatCount="indefinite" />
              </circle>
              <animateTransform attributeName="transform" type="translate"
                values="200,195; 200,195; 240,210; 250,290"
                keyTimes="0;0.5;0.7;1" dur="2.4s" repeatCount="indefinite" />
            </g>

            <!-- Mirror break-up event on LEFT side -->
            <g>
              <circle r="6" fill="var(--orange)" opacity="0.9">
                <animate attributeName="opacity" values="0.9;0.9;0;0" keyTimes="0;0.45;0.5;1" dur="2.4s" begin="-1.2s" repeatCount="indefinite" />
              </circle>
              <circle r="2" fill="var(--sky)">
                <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.5;1" dur="2.4s" begin="-1.2s" repeatCount="indefinite" />
              </circle>
              <animateMotion dur="2.4s" begin="-1.2s" repeatCount="indefinite">
                <mpath xlink:href="#loopUL" />
              </animateMotion>
            </g>
            <g>
              <circle r="2.5" fill="var(--orange)">
                <animate attributeName="opacity" values="0;0;0.9;0.9;0" keyTimes="0;0.5;0.55;0.95;1" dur="2.4s" begin="-1.2s" repeatCount="indefinite" />
              </circle>
              <animateTransform attributeName="transform" type="translate"
                values="120,195; 120,195; 80,180; 70,80"
                keyTimes="0;0.5;0.7;1" dur="2.4s" begin="-1.2s" repeatCount="indefinite" />
            </g>
            <g>
              <circle r="2.5" fill="var(--orange)">
                <animate attributeName="opacity" values="0;0;0.9;0.9;0" keyTimes="0;0.5;0.55;0.95;1" dur="2.4s" begin="-1.2s" repeatCount="indefinite" />
              </circle>
              <animateTransform attributeName="transform" type="translate"
                values="120,195; 120,195; 80,210; 70,290"
                keyTimes="0;0.5;0.7;1" dur="2.4s" begin="-1.2s" repeatCount="indefinite" />
            </g>
          </g>
        </svg>
      </div>
    </div>

    <!-- ==================== VIEW 4: bottom, transparent ==================== -->
    <div class="view transparent" data-view="4">
      <div class="stage">
        <svg viewBox="0 0 320 360" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
          <circle cx="160" cy="180" r="142" fill="none" stroke="var(--steel-dark)" stroke-width="1.6" />
          <circle cx="160" cy="180" r="140" fill="var(--glass)" stroke="none" />

          <!-- Tangential swirl with arrows (CCW) -->
          <g class="flow-path" fill="none" stroke="var(--accent)" stroke-width="2">
            <use xlink:href="#swirlOuter" marker-end="url(#arrowAccent)" />
            <use xlink:href="#swirlMid" marker-end="url(#arrowAccent)" />
          </g>

          <!-- Radial discharge jets with arrows -->
          <g class="flow-path" fill="none" stroke="var(--orange)" stroke-width="1.5">
            <use xlink:href="#discharge0" marker-end="url(#arrowOrange)" />
            <use xlink:href="#discharge1" marker-end="url(#arrowOrange)" />
            <use xlink:href="#discharge2" marker-end="url(#arrowOrange)" />
            <use xlink:href="#discharge3" marker-end="url(#arrowOrange)" />
            <use xlink:href="#discharge4" marker-end="url(#arrowOrange)" />
            <use xlink:href="#discharge5" marker-end="url(#arrowOrange)" />
          </g>

          <!-- Rotating transparent agitator -->
          <g class="agitator rotor-spin" style="transform-origin: 160px 180px">
            <circle cx="160" cy="180" r="42" fill="var(--steel)" stroke="var(--steel-dark)" stroke-width="0.6" />
            <g id="tabs-bottom-2"></g>
            <circle cx="160" cy="180" r="6" fill="var(--bg)" stroke="var(--steel-dark)" stroke-width="0.5" />
            <path d="M 160 150 A 30 30 0 0 1 188 178 L 184 174 M 188 178 L 184 182"
                  fill="none" stroke="var(--accent)" stroke-width="1.2" />
          </g>

          <!-- Droplets swirling -->
          <g class="droplets">
            <g>
              <circle r="6" fill="var(--orange)" opacity="0.9" />
              <circle r="2" fill="var(--sky)" />
              <animateMotion dur="3.5s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#swirlOuter" />
              </animateMotion>
            </g>
            <g>
              <circle r="5" fill="var(--orange)" opacity="0.9" />
              <circle r="1.8" fill="var(--sky)" />
              <animateMotion dur="3.5s" begin="-1s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#swirlOuter" />
              </animateMotion>
            </g>
            <g>
              <circle r="6" fill="var(--orange)" opacity="0.9" />
              <circle r="2" fill="var(--sky)" />
              <animateMotion dur="3.5s" begin="-2s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#swirlOuter" />
              </animateMotion>
            </g>
            <g>
              <circle r="4" fill="var(--orange)" opacity="0.9" />
              <circle r="1.4" fill="var(--sky)" />
              <animateMotion dur="2s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#swirlMid" />
              </animateMotion>
            </g>
            <g>
              <circle r="4" fill="var(--orange)" opacity="0.9" />
              <circle r="1.4" fill="var(--sky)" />
              <animateMotion dur="2s" begin="-1s" repeatCount="indefinite" rotate="auto">
                <mpath xlink:href="#swirlMid" />
              </animateMotion>
            </g>

            <!-- Break-up events: parent droplets follow tangential swirl,
                 split at radial discharge jets, fragments fly outward -->
            <g>
              <circle r="5" fill="var(--orange)">
                <animate attributeName="opacity" values="0.9;0.9;0;0" keyTimes="0;0.45;0.5;1" dur="2s" repeatCount="indefinite" />
              </circle>
              <circle r="1.8" fill="var(--sky)">
                <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.5;1" dur="2s" repeatCount="indefinite" />
              </circle>
              <animateMotion dur="2s" repeatCount="indefinite">
                <mpath xlink:href="#swirlMid" />
              </animateMotion>
            </g>
            <!-- Fragment along discharge0 (right) -->
            <g>
              <circle r="2" fill="var(--orange)">
                <animate attributeName="opacity" values="0;0;0.9;0.9;0" keyTimes="0;0.5;0.55;0.95;1" dur="2s" repeatCount="indefinite" />
              </circle>
              <animateMotion dur="2s" repeatCount="indefinite">
                <mpath xlink:href="#discharge0" />
              </animateMotion>
            </g>
            <g>
              <circle r="2" fill="var(--orange)">
                <animate attributeName="opacity" values="0;0;0.9;0.9;0" keyTimes="0;0.5;0.55;0.95;1" dur="2s" begin="-0.7s" repeatCount="indefinite" />
              </circle>
              <animateMotion dur="2s" begin="-0.7s" repeatCount="indefinite">
                <mpath xlink:href="#discharge2" />
              </animateMotion>
            </g>
            <g>
              <circle r="2" fill="var(--orange)">
                <animate attributeName="opacity" values="0;0;0.9;0.9;0" keyTimes="0;0.5;0.55;0.95;1" dur="2s" begin="-1.3s" repeatCount="indefinite" />
              </circle>
              <animateMotion dur="2s" begin="-1.3s" repeatCount="indefinite">
                <mpath xlink:href="#discharge4" />
              </animateMotion>
            </g>
          </g>
        </svg>
      </div>
    </div>

    <div class="legend">
      <span><span class="swatch" style="background: var(--steel)"></span>Stirrer A · 19-tab</span>
      <span><span class="swatch" style="background: var(--orange)"></span>Outer oil drop</span>
      <span><span class="swatch" style="background: var(--sky)"></span>Inner aq drop</span>
      <span><span class="swatch" style="background: var(--accent)"></span>Circulation</span>
      <span><span class="swatch" style="background: var(--magenta)"></span>Break-up</span>
    </div>
  </div>

<script>
  (function() {
    var rpm = parseFloat("__RPM__") || 420;
    var period = 1.5 / Math.max(0.3, Math.log10(Math.max(100, rpm) / 100));
    period = Math.min(3.0, Math.max(0.3, period));
    document.documentElement.style.setProperty("--spin-period", period.toFixed(2) + "s");
    // Side-view streak cadence — faster than disk rotation to evoke
    // motion blur of tabs cycling past the viewing plane.
    var streak = Math.max(0.18, period * 0.4);
    document.documentElement.style.setProperty("--streak-period", streak.toFixed(2) + "s");

    function buildTabs(containerId) {
      var container = document.getElementById(containerId);
      if (!container) return;
      var nTabs = 19;
      var R_disk = 42;
      var tabWidth = 9 / 1.41;
      var tabHeight = 8.5 / 1.41;
      for (var i = 0; i < nTabs; i++) {
        var angleDeg = (360.0 / nTabs) * i;
        var goingUp = (i % 2 === 0);
        var rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", -tabWidth / 2);
        rect.setAttribute("y", R_disk - tabHeight / 2);
        rect.setAttribute("width", tabWidth);
        rect.setAttribute("height", tabHeight);
        rect.setAttribute("fill", goingUp ? "var(--steel)" : "var(--steel-dark)");
        rect.setAttribute("stroke", "var(--steel-dark)");
        rect.setAttribute("stroke-width", "0.3");
        rect.setAttribute("transform",
          "translate(160 180) rotate(" + (angleDeg + 10) + ")");
        container.appendChild(rect);
      }
    }
    buildTabs("tabs-bottom");
    buildTabs("tabs-bottom-2");

    var labels = {
      "1": "SIDE · OPAQUE",
      "2": "BOTTOM · OPAQUE",
      "3": "SIDE · TRANSPARENT",
      "4": "BOTTOM · TRANSPARENT"
    };
    var current = 1;
    var btn = document.getElementById("toggleBtn");
    var lbl = document.getElementById("viewLabel");
    btn.addEventListener("click", function() {
      document.querySelector('.view[data-view="' + current + '"]').classList.remove("active");
      current = (current % 4) + 1;
      document.querySelector('.view[data-view="' + current + '"]').classList.add("active");
      btn.textContent = labels[String(current)];
      lbl.textContent = "VIEW " + current + " / 4";
    });
  })();
</script>
</body>
</html>
