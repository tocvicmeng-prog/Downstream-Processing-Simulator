<!doctype html>
<!--
  ImpellerCrossSection v2 — disk-style 19-tab Stirrer A in glass beaker.

  Geometry sourced from cad/scripts/build_geometry.py (verified
  2026-05-01 against measurement photos):
    Stirrer A — Ø 59 mm flat disk, 1 mm thick, 19 perimeter tabs
                (10 UP + 9 DOWN, alternating; 90° perpendicular bend;
                10° tangential fan-pitch; tab 9 mm tangential x 8.5 mm
                axial x 1 mm thick).
    Beaker   — Ø 100 mm inner, 130 mm tall, 1.5 mm wall, 2.5 mm base,
                R=10 mm inner-bottom fillet, R=5 mm outer-bottom
                fillet, 20° outward-flared rim extending 5 mm radially.

  Four view states cycled by a single toggle button (top-right of the
  diagram):
    1: side-view cross-section — opaque agitator, basic flow lines
    2: bottom-view cross-section — opaque agitator, basic flow lines
    3: side-view cross-section — TRANSPARENT agitator, emphasised
        circulation pattern + double-emulsion droplet collisions
    4: bottom-view cross-section — TRANSPARENT agitator, emphasised
        tangential flow vectors + droplet collisions

  Template substitutions (replaced by impeller_xsec_v2.py at render):
    __RPM__              float, RPM
    __WIDTH__, __HEIGHT__ int, iframe size
    __THEME__            "dark" | "light"
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --bg:        #020617;
    --surface:   #0F172A;
    --surface-2: #1E293B;
    --border:    rgba(71, 85, 105, 0.55);
    --text:      #F8FAFC;
    --text-muted: #94A3B8;
    --text-dim:  #64748B;
    --accent:    #2DD4BF;
    --orange:    #F97316;
    --sky:       #7DD3FC;
    --magenta:   #E879F9;
    --steel:     #94A3B8;
    --steel-dark: #64748B;
    --glass:     rgba(125, 211, 252, 0.25);
  }
  body.light {
    --bg: #FAFBFC; --surface: #FFFFFF; --surface-2: #F1F5F9;
    --border: rgba(148,163,184,0.35);
    --text: #0F172A; --text-muted: #64748B; --text-dim: #94A3B8;
    --accent: #14B8A6;
    --glass: rgba(56, 189, 248, 0.20);
  }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    position: relative;
    width: __WIDTH__px;
    height: __HEIGHT__px;
    margin: 0 auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .toggle-btn {
    position: absolute;
    top: 8px; right: 8px;
    z-index: 10;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 10px;
    font-family: "Geist Mono", "JetBrains Mono", Menlo, monospace;
    letter-spacing: 0.04em;
    cursor: pointer;
    user-select: none;
    transition: background 120ms;
  }
  .toggle-btn:hover { background: var(--surface-2); }
  .toggle-btn:active { background: var(--surface-2); }
  .view-label {
    position: absolute;
    top: 8px; left: 8px;
    z-index: 5;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 9.5px;
    font-family: "Geist Mono", "JetBrains Mono", Menlo, monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .stage { position: absolute; inset: 0; }
  .stage svg {
    display: block;
    width: 100%; height: 100%;
  }
  .view {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 220ms ease;
    pointer-events: none;
  }
  .view.active {
    opacity: 1;
    pointer-events: auto;
  }
  /* Agitator parts — opacity controlled by .transparent modifier on .view */
  .agitator { transition: opacity 200ms ease; }
  .view:not(.transparent) .agitator { opacity: 1.0; }
  .view.transparent .agitator { opacity: 0.25; }
  .view.transparent .flow-emphasis { opacity: 1.0; }
  .view:not(.transparent) .flow-emphasis { opacity: 0.6; }

  /* Animations */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes spin-rev {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
  }
  .rotor-spin {
    /* Period derived from RPM at runtime via inline CSS variable */
    animation: spin var(--spin-period, 0.5s) linear infinite;
    transform-origin: center;
  }
  @keyframes flow-dash {
    to { stroke-dashoffset: -100; }
  }
  .flow {
    fill: none;
    stroke-dasharray: 4 6;
    animation: flow-dash 1.6s linear infinite;
  }
  .flow.fast { animation-duration: 0.9s; }
  .flow.slow { animation-duration: 2.4s; }

  @keyframes drift-1 {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(8px, -4px); }
    50%  { transform: translate(2px, 6px); }
    75%  { transform: translate(-6px, -2px); }
    100% { transform: translate(0, 0); }
  }
  @keyframes drift-2 {
    0%   { transform: translate(0, 0); }
    33%  { transform: translate(-6px, 8px); }
    66%  { transform: translate(7px, 3px); }
    100% { transform: translate(0, 0); }
  }
  @keyframes drift-3 {
    0%   { transform: translate(0, 0); }
    50%  { transform: translate(5px, -7px); }
    100% { transform: translate(0, 0); }
  }
  .droplet { transform-origin: center; }
  .droplet.d1 { animation: drift-1 2.1s ease-in-out infinite; }
  .droplet.d2 { animation: drift-2 1.7s ease-in-out infinite; }
  .droplet.d3 { animation: drift-3 2.6s ease-in-out infinite; }

  .legend {
    position: absolute;
    bottom: 8px; left: 8px; right: 8px;
    display: flex; gap: 14px;
    font-size: 9.5px;
    color: var(--text-dim);
    font-family: "Geist Mono", "JetBrains Mono", Menlo, monospace;
    letter-spacing: 0.04em;
    flex-wrap: wrap;
    justify-content: center;
    pointer-events: none;
  }
  .legend .swatch {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: -1px;
  }
</style>
</head>
<body class="__THEME__">

<script>
  (function() {
    // Spin period from RPM. Slow it down for visualisation; otherwise the
    // disk would be a blur at typical 1300+ RPM.
    var rpm = parseFloat("__RPM__") || 420;
    // Visual cadence: 1 visual rotation per (1.5 / log10(rpm/100)) seconds,
    // bounded to [0.3, 3.0] s for legibility.
    var period = 1.5 / Math.max(0.3, Math.log10(Math.max(100, rpm) / 100));
    period = Math.min(3.0, Math.max(0.3, period));
    document.documentElement.style.setProperty("--spin-period", period.toFixed(2) + "s");

    // Build 19 perimeter tabs around the disk (bottom view — view 2 and 4)
    function buildTabs(containerId) {
      var container = document.getElementById(containerId);
      if (!container) return;
      var nTabs = 19;
      var R_disk = 42;
      var tabWidth = 9 / 1.41;     // tangential width 9 mm @ scale ~1.41 px/mm
      var tabHeight = 8.5 / 1.41;  // radial extent of tab when viewed from below
      // Tab is at the disk perimeter, slightly outside (radially)
      for (var i = 0; i < nTabs; i++) {
        var angleDeg = (360.0 / nTabs) * i;
        var goingUp = (i % 2 === 0);
        // 10° tangential pitch — tilt the tab slightly
        var rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", -tabWidth / 2);
        rect.setAttribute("y", R_disk - tabHeight / 2);
        rect.setAttribute("width", tabWidth);
        rect.setAttribute("height", tabHeight);
        rect.setAttribute("fill", goingUp ? "var(--steel)" : "var(--steel-dark)");
        rect.setAttribute("stroke", "var(--steel-dark)");
        rect.setAttribute("stroke-width", "0.3");
        rect.setAttribute("transform",
          "translate(160 180) rotate(" + (angleDeg + 10) + ")");
        container.appendChild(rect);
      }
    }
    buildTabs("tabs-bottom");
    buildTabs("tabs-bottom-2");

    // Build radial jet markers (view 4)
    var jets = document.getElementById("radial-jets");
    if (jets) {
      for (var i = 0; i < 6; i++) {
        var ang = (360 / 6) * i;
        var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        var x1 = 160 + 50 * Math.cos(ang * Math.PI / 180);
        var y1 = 180 + 50 * Math.sin(ang * Math.PI / 180);
        var x2 = 160 + 100 * Math.cos(ang * Math.PI / 180);
        var y2 = 180 + 100 * Math.sin(ang * Math.PI / 180);
        line.setAttribute("x1", x1.toFixed(1));
        line.setAttribute("y1", y1.toFixed(1));
        line.setAttribute("x2", x2.toFixed(1));
        line.setAttribute("y2", y2.toFixed(1));
        line.setAttribute("class", "flow fast");
        line.setAttribute("stroke", "var(--orange)");
        line.setAttribute("stroke-width", "1.4");
        jets.appendChild(line);
      }
    }

    // Build vortex markers (view 4)
    var vortex = document.getElementById("vortex-markers");
    if (vortex) {
      for (var i = 0; i < 4; i++) {
        var ang = 45 + (360 / 4) * i;
        var x = 160 + 65 * Math.cos(ang * Math.PI / 180);
        var y = 180 + 65 * Math.sin(ang * Math.PI / 180);
        var c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", x.toFixed(1));
        c.setAttribute("cy", y.toFixed(1));
        c.setAttribute("r", "3");
        c.setAttribute("fill", "none");
        c.setAttribute("stroke", "var(--magenta)");
        c.setAttribute("stroke-width", "0.8");
        c.setAttribute("opacity", "0.7");
        vortex.appendChild(c);
      }
    }

    // Toggle button: cycle through views 1 → 2 → 3 → 4 → 1
    var labels = {
      "1": "SIDE · OPAQUE",
      "2": "BOTTOM · OPAQUE",
      "3": "SIDE · TRANSPARENT",
      "4": "BOTTOM · TRANSPARENT"
    };
    var current = 1;
    var btn = document.getElementById("toggleBtn");
    var lbl = document.getElementById("viewLabel");
    btn.addEventListener("click", function() {
      // Hide current view
      document.querySelector('.view[data-view="' + current + '"]').classList.remove("active");
      // Advance state
      current = (current % 4) + 1;
      // Show new view
      document.querySelector('.view[data-view="' + current + '"]').classList.add("active");
      // Update button + label
      btn.textContent = labels[String(current)];
      lbl.textContent = "VIEW " + current + " / 4";
    });
  })();
</script>
</body>
</html>
